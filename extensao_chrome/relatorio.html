<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Conferência — Pedido CLIPP</title>
  <style>
    :root {
      --ok: #137333;
      --ok-bg: #e6f4ea;
      --pend: #c5221f;
      --pend-bg: #fce8e6;
      --muted: #5f6368;
      --border: #dadce0;
      --bg: #f8f9fa;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      margin: 0;
      background: var(--bg);
      color: #202124;
      font-size: 14px;
      line-height: 1.45;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
    }
    header h1 { margin: 0 0 4px; font-size: 20px; }
    header .sub { color: var(--muted); font-size: 13px; }
    main { max-width: 1200px; margin: 0 auto; padding: 20px 24px 40px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
    .card .valor { font-size: 22px; font-weight: 600; margin-top: 4px; }
    .card.ok .valor { color: var(--ok); }
    .card.pend .valor { color: var(--pend); }
    .avisos {
      background: #fef7e0;
      border: 1px solid #f9ab00;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }
    .avisos ul { margin: 8px 0 0; padding-left: 20px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
    section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    section h2 {
      margin: 0;
      padding: 12px 16px;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
    }
    section.importados h2 { background: var(--ok-bg); color: var(--ok); }
    section.pendentes h2 { background: var(--pend-bg); color: var(--pend); }
    .tabela-wrap { max-height: 70vh; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { position: sticky; top: 0; background: #fff; z-index: 1; font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    .ref { font-weight: 600; font-family: Consolas, monospace; font-size: 12px; }
    .motivo {
      display: inline-block;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--pend-bg);
      color: var(--pend);
    }
    .vazio { padding: 24px; text-align: center; color: var(--muted); }
    #erro { padding: 40px; text-align: center; color: var(--pend); }
  </style>
</head>
<body>
  <header>
    <h1 id="titulo">Conferência de importação</h1>
    <div class="sub" id="subtitulo">Carregando…</div>
  </header>
  <main id="conteudo">
    <div id="erro" hidden>Relatório não encontrado. Reimporte o pedido.</div>
  </main>
  <script src="relatorio.js"></script>
</body>
</html>
